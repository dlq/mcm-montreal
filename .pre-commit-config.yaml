repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]

      - id: djlint-reformat
        name: djlint reformat
        entry: uv run djlint --reformat
        language: system
        files: ^templates/.*\.html$

      - id: djlint-lint
        name: djlint lint
        entry: uv run djlint --lint
        language: system
        files: ^templates/.*\.html$

      - id: biome
        name: biome check
        entry: ./node_modules/.bin/biome check --write
        language: system
        files: ^static/.*\.(js|css)$
