name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Python dependencies
        run: uv sync --dev --frozen

      - name: Install Node dependencies
        run: npm ci

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run python -m unittest tests.test_app

      - name: Run djLint
        run: uv run djlint templates --lint

      - name: Run Biome
        run: ./node_modules/.bin/biome check static
