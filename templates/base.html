<!DOCTYPE html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% block title %}Montreal MCM{% endblock %}
    </title>
    <link rel="icon"
          type="image/svg+xml"
          href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              oat: "#f7f6f2",
              ink: "#1c1c1a",
              clay: "#9b5a42",
              moss: "#4d5f4a",
              brass: "#8c7a44",
              pool: "#5f7882",
              rose: "#a9675c",
              paper: "#ffffff"
            },
            fontFamily: {
              display: ["Inter", "Helvetica Neue", "Arial", "sans-serif"],
              sans: ["Inter", "Helvetica Neue", "Arial", "sans-serif"]
            }
          }
        }
      }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body class="min-h-screen bg-oat text-ink">
    <div class="mx-auto max-w-[1440px] px-4 py-5 sm:px-6 md:px-8 lg:px-10">
      <header class="mb-8 border-b border-ink/10 pb-5">
        <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <a href="{{ url_for('listings') }}"
               class="site-mark inline-block text-2xl font-semibold tracking-tight">Montreal MCM</a>
            <p class="mt-1 max-w-2xl text-sm leading-6 text-ink/60">{{ t("site.tagline") }}</p>
          </div>
          <nav class="flex flex-wrap items-center gap-x-5 gap-y-2 text-sm font-medium">
            <a class="nav-link" href="{{ lang_url_en }}">EN</a>
            <a class="nav-link" href="{{ lang_url_fr }}">FR</a>
            <a class="nav-link" href="{{ url_for('listings') }}">{{ t("nav.listings") }}</a>
            <a class="nav-link" href="{{ url_for('shops') }}">{{ t("nav.shops") }}</a>
            <a class="nav-link" href="{{ url_for('favourites') }}">{{ t("nav.favourites") }}
              {% include "_favourite_listing_count.html" %}
            </a>
          </nav>
        </div>
      </header>
      {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
