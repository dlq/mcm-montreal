<favorite-toggle>
<button class="border-b border-ink/20 pb-1 text-xs font-semibold uppercase tracking-[0.12em] text-ink/55 hover:border-ink hover:text-ink"
        hx-post="{{ url_for('toggle_listing_favourite', listing_id=listing.id) }}"
        hx-swap="outerHTML">
  {% if listing.is_favourited %}
    {{ t("listing.saved") }}
  {% else %}
    {{ t("listing.save") }}
  {% endif %}
</button>
</favorite-toggle>
