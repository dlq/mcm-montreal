<favorite-toggle>
<button class="rounded-full border border-ink/10 px-3 py-2 text-xs hover:bg-ink hover:text-white"
        hx-post="{{ url_for('toggle_listing_favourite', listing_id=listing.id) }}"
        hx-swap="outerHTML">
  {% if listing.is_favourited %}
    {{ t("listing.saved") }}
  {% else %}
    {{ t("listing.save") }}
  {% endif %}
</button>
</favorite-toggle>
