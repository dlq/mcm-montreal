{% extends "base.html" %}
{% block title %}Montreal MCM{% endblock %}

    <p class="source-kicker mb-4">{{ t("offline.kicker") }}</p>
    <h1 class="item-title item-title-detail">{{ t("offline.title") }}</h1>
