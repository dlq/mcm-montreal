{% set map = shop_map_data(shop) %}
{% set shop_map_variant = shop_map_variant|default("card") %}
<figure class="shop-map shop-map-{{ shop_map_variant }}"
        role="img"
        aria-label="{{ t('shop.map_aria', name=shop.name, location=map.label) }}">
  <svg viewBox="0 0 220 132" aria-hidden="true" focusable="false">
    <path class="shop-map-land" d="M22 32 C55 15 87 22 113 34 C139 46 168 35 196 49 C185 76 161 101 130 111 C99 121 63 110 37 91 C18 77 12 55 22 32 Z" />
    <path class="shop-map-river" d="M34 82 C61 69 83 75 108 66 C132 57 149 40 184 43" />
    <path class="shop-map-route" d="M51 57 L91 70 L132 73 L169 88" />
    <circle class="shop-map-city" cx="63" cy="55" r="2.5" />
    <circle class="shop-map-city" cx="133" cy="73" r="3" />
    <circle class="shop-map-city" cx="168" cy="88" r="2.5" />
    <text x="49" y="49">OTT</text>
    <text x="118" y="66">MTL</text>
    <text x="155" y="105">QC</text>
    <g class="shop-map-pin" transform="translate({{ map.x }} {{ map.y }})">
    <circle r="7" />
    <circle r="2.5" />
    </g>
  </svg>
  <figcaption class="shop-map-label">
    <span>{{ t("shop.map_title") }}</span>
    <strong>{{ map.label }}</strong>
  </figcaption>
</figure>
