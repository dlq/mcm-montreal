<favorite-toggle>
<button class="rounded-full border border-ink/10 px-3 py-2 text-xs hover:bg-ink hover:text-white"
        hx-post="{{ url_for('toggle_shop_favourite', shop_id=shop.id) }}"
        hx-swap="outerHTML">
  {% if shop.is_favourited %}
    {{ t("shop.saved") }}
  {% else %}
    {{ t("shop.save") }}
  {% endif %}
</button>
</favorite-toggle>
