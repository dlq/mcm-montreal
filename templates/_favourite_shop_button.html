<favorite-toggle>
{% set favourite_label = t("shop.saved") if shop.is_favourited else t("shop.save") %}
<button class="favourite-icon-button"
        data-favourited="{{ 'true' if shop.is_favourited else 'false' }}"
        hx-post="{{ url_for('toggle_shop_favourite', shop_id=shop.id) }}"
        hx-target="closest favorite-toggle"
        hx-swap="outerHTML"
        aria-pressed="{{ 'true' if shop.is_favourited else 'false' }}"
        aria-label="{{ favourite_label }}"
        title="{{ favourite_label }}">
  <svg aria-hidden="true"
       class="favourite-icon"
       viewBox="0 0 24 24"
       focusable="false">
    <path d="M12 20.2c-.3 0-.6-.1-.8-.3C5.4 14.9 2 11.7 2 7.8 2 4.9 4.2 3 6.9 3c1.6 0 3.1.8 4.1 2 .9-1.2 2.5-2 4.1-2C17.8 3 20 4.9 20 7.8c0 3.9-3.4 7.1-9.2 12.1-.2.2-.5.3-.8.3z" />
  </svg>
</button>
</favorite-toggle>
