<favorite-toggle>
<button class="border-b border-ink/20 pb-1 text-xs font-semibold uppercase tracking-[0.12em] text-ink/55 hover:border-ink hover:text-ink"
        hx-post="{{ url_for('toggle_shop_favourite', shop_id=shop.id) }}"
        hx-swap="outerHTML">
  {% if shop.is_favourited %}
    {{ t("shop.saved") }}
  {% else %}
    {{ t("shop.save") }}
  {% endif %}
</button>
</favorite-toggle>
